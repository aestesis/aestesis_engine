name: aestesis_engine_example
description: "Demonstrates how to use the aestesis_engine plugin."
publish_to: "none"

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  aestesis_engine:
    path: ../

  bb_dart:
    git: https://github.com/aestesis/bb.dart.git
  bb.flutter:
    git: https://github.com/aestesis/bb.flutter.git

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  config:
    enable-swift-package-manager: true
  uses-material-design: true
